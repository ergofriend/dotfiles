[env]
GHQ_ROOT = "{{env.HOME}}/Documents/dev"

[tools]
1password = "latest"
gh = "latest"
ghq = "latest"
node = "latest"
starship = "latest"
fzf = "latest"
yazi = "latest"
rtk = "latest"
bat = "latest"

"npm:difit" = "latest"
"npm:ccusage" = "latest"
"npm:@openai/codex" = "latest"

"github:ushironoko/abbrs" = "latest"
"github:trasta298/keifu" = "latest"
"github:ogulcancelik/herdr" = "latest"

[settings]
install_before = "7d"  # only install versions released more than 7 days ago

[settings.github]
# gh CLI stores its token in the macOS keyring, not hosts.yml, so mise
# cannot read it directly; fetch it via gh instead.
credential_command = "gh auth token"

[tools.claude]
version = "latest"
install_before = "0d"
